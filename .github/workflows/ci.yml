name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  P4_VERSION: r24.2
  JJ_VERSION: "0.39.0"
  LUALS_VERSION: 3.13.4
  # Pinned for the LuaLS type-check job so the required gate stays
  # deterministic: a new Neovim stable release can change deprecation/type
  # metadata in `$VIMRUNTIME/lua/vim/_meta`, which would otherwise cause
  # unrelated PRs to start failing. Bump intentionally when ready to absorb
  # the new diagnostics.
  NVIM_TYPECHECK_VERSION: v0.12.2

jobs:
  commit-style:
    runs-on: ubuntu-latest
    name: Conventional commits
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Skip GitHub's synthetic merge commit (would fail `cz check`).
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Lint commits
        run: |
          range="origin/${{ github.base_ref }}..HEAD"
          if [ -z "$(git rev-list "$range")" ]; then
            echo "No new commits vs base; skipping cz check."
            exit 0
          fi
          cz check --rev-range "$range"

  lint:
    runs-on: ubuntu-latest
    name: Lint (stylua)
    steps:
      - uses: actions/checkout@v4

      - name: Cache stylua binary
        id: cache-stylua
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stylua
          key: stylua-2.4.1-luajit-linux-x86_64

      - name: Install stylua (luajit feature)
        if: steps.cache-stylua.outputs.cache-hit != 'true'
        run: cargo install stylua --locked --version 2.4.1 --features luajit

      - name: Check formatting
        run: stylua --check lua/ scripts/

  config-schema:
    runs-on: ubuntu-latest
    name: Config schema drift check
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Check DiffviewConfig sync with M.defaults
        run: make check-config-schema

  type-check:
    runs-on: ubuntu-latest
    name: Type check (LuaLS)
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ env.NVIM_TYPECHECK_VERSION }}

      - name: Cache lua-language-server
        id: cache-luals
        uses: actions/cache@v4
        with:
          path: ~/.local/share/lua-language-server
          key: luals-${{ env.LUALS_VERSION }}-linux-x64

      - name: Install lua-language-server
        if: steps.cache-luals.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/lua-language-server
          curl -sL "https://github.com/LuaLS/lua-language-server/releases/download/${{ env.LUALS_VERSION }}/lua-language-server-${{ env.LUALS_VERSION }}-linux-x64.tar.gz" \
            | tar -xz -C ~/.local/share/lua-language-server

      - name: Expose lua-language-server on PATH
        run: |
          mkdir -p ~/.local/bin
          ln -sf ~/.local/share/lua-language-server/bin/lua-language-server ~/.local/bin/lua-language-server

      - name: Fetch neodev + plenary sources
        run: make dev

      - name: Run LuaLS check (source)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make type-check

      - name: Run LuaLS check (tests, advisory)
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make type-check-tests

      - name: Upload LuaLS diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luals-check
          path: |
            .luals-log/check.json
            .luals-log-tests/check.json
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pin the lowest patch on each supported minor so the inline-diff
        # window-scoping fallbacks (Neovim < 0.11 → no-op + warning;
        # 0.11 → experimental `nvim__ns_set`; 0.12+ → stable
        # `nvim_win_add_ns`) all have an explicit gate. `stable` /
        # `nightly` give forward-compat coverage on top.
        neovim: [v0.10.4, v0.11.6, stable, nightly]
    # Keep nightly as an early-warning signal but don't let it block PRs.
    continue-on-error: ${{ matrix.neovim == 'nightly' }}
    name: Test (Neovim ${{ matrix.neovim }})
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Cache VCS tool binaries
        id: cache-vcs
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: vcs-tools-linux-x86_64-p4-${{ env.P4_VERSION }}-jj-${{ env.JJ_VERSION }}

      - name: Install VCS tools
        if: steps.cache-vcs.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin

          # Perforce
          curl -sL "https://cdist2.perforce.com/perforce/${{ env.P4_VERSION }}/bin.linux26x86_64/p4" \
            -o ~/.local/bin/p4
          curl -sL "https://cdist2.perforce.com/perforce/${{ env.P4_VERSION }}/bin.linux26x86_64/p4d" \
            -o ~/.local/bin/p4d
          chmod +x ~/.local/bin/p4 ~/.local/bin/p4d

          # Jujutsu
          curl -sL "https://github.com/jj-vcs/jj/releases/download/v${{ env.JJ_VERSION }}/jj-v${{ env.JJ_VERSION }}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C ~/.local/bin ./jj
          chmod +x ~/.local/bin/jj

      - name: Install Mercurial
        run: pip install mercurial

      - name: Run tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make test
